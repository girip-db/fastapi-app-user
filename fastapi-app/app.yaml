command: ["uvicorn", "app:app", "--host", "0.0.0.0", "--port", "8000"]
env:
  - name: DATABRICKS_WAREHOUSE_ID
    value: "<YOUR_WAREHOUSE_ID>"  # Replaced automatically by deploy.sh from .env
  - name: LAKEBASE_HOST
    value: "LAKEBASE_HOST_PLACEHOLDER"  # Replaced by deploy.sh from .env
  - name: LAKEBASE_DATABASE_NAME
    value: "LAKEBASE_DATABASE_NAME_PLACEHOLDER"  # Replaced by deploy.sh from .env
  - name: LAKEBASE_ENDPOINT
    value: "LAKEBASE_ENDPOINT_PLACEHOLDER"  # Replaced by deploy.sh (optional, auto-discovered if empty)
  - name: LAKEBASE_SCHEMA
    value: "LAKEBASE_SCHEMA_PLACEHOLDER"  # Replaced by deploy.sh from .env (default: public)
